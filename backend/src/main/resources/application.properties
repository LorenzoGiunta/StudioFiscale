spring.application.name=gestionalec

# Credenziali e segreti letti da variabili d'ambiente (vedi .env.example).
# URL e username hanno un default di sviluppo; i SEGRETI (password DB e JWT) NON
# hanno default: se la variabile d'ambiente manca l'app NON parte. Questo evita
# di usare in produzione valori pubblici noti (finiti su git).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gestionalec}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true

# La sessione Hibernate NON resta aperta durante il rendering della risposta:
# le connessioni al DB si liberano prima e gli accessi LAZY fuori dai service
# falliscono subito invece di nascondere query N+1. Richiede che i service
# carichino (fetch/inizializzazione) tutto ciò che serve ai mapper.
spring.jpa.open-in-view=false

#come mi comporto col database preesistente
spring.jpa.hibernate.ddl-auto=create-drop

# Seed dati di sviluppo (src/main/resources/data.sql):
# - defer-datasource-initialization: esegue data.sql DOPO che Hibernate ha creato lo schema
# - sql.init.mode=always: esegue gli script anche su DB non embedded (MySQL)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always


jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
# 86400000 ms = 24 ore

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Username e App Password Gmail: impostare via variabili d'ambiente, mai nel codice
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Invio email attivo solo se configurato (default off: evita errori SMTP in locale/demo)
app.email.enabled=${EMAIL_ENABLED:true}

file.upload-dir=uploads/documenti
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB


# Non strettamente necessario, ma lascia la porta aperta
spring.websocket.client.user-destination-prefix=/user

# URL base del frontend React usato per costruire i link nelle email di invito
app.frontend-url=http://localhost:5173
